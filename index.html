<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нохчийн Мотт</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Мотт">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#070b14">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070b14;
  --surface: #0d1525;
  --card: #111d33;
  --border: #1e2f4a;
  --blue: #2d6be4;
  --blue2: #5b8ff9;
  --cyan: #00c6ff;
  --white: #e8f0ff;
  --muted: #5a7090;
  --red: #e05555;
  --green: #2ecc71;
  --gold: #f0c040;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Manrope', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 10% 10%, rgba(45,107,228,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 90%, rgba(0,198,255,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(13,21,37,0.8) 0%, transparent 100%);
  pointer-events:none;
  z-index:0;
}
.container { width:100%; max-width:420px; padding:0 16px 60px; position:relative; z-index:1; }
.screen { display:none; }
.screen.active { display:block; }

/* HEADER */
header {
  text-align:center;
  padding:36px 0 24px;
  border-bottom:1px solid var(--border);
  margin-bottom:24px;
  position:relative;
}
header::after {
  content:'';
  position:absolute;
  bottom:-1px; left:50%; transform:translateX(-50%);
  width:80px; height:2px;
  background:linear-gradient(90deg, var(--blue), var(--cyan));
  border-radius:2px;
}
.logo-icon { font-size:32px; margin-bottom:8px; }
.logo-text {
  font-family:'Unbounded',sans-serif;
  font-size:10px;
  letter-spacing:4px;
  color:var(--cyan);
  text-transform:uppercase;
  margin-bottom:10px;
}
h1 { font-family:'Unbounded',sans-serif; font-size:22px; font-weight:900; color:var(--white); line-height:1.2; }
h1 span { color:var(--cyan); }
.subtitle { font-size:13px; color:var(--muted); margin-top:6px; }

/* REGISTER */
.register-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px 24px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}
.register-card::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, var(--blue), var(--cyan));
}
.field-label {
  font-size:11px; letter-spacing:2px; color:var(--muted);
  text-transform:uppercase; margin-bottom:8px; margin-top:20px;
  font-family:'Unbounded',sans-serif;
}
.field-label:first-child { margin-top:0; }
.text-input {
  width:100%; background:var(--surface);
  border:1px solid var(--border); border-radius:12px;
  padding:13px 16px; color:var(--white);
  font-family:'Manrope',sans-serif; font-size:16px;
  outline:none; transition:border-color 0.2s;
}
.text-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(45,107,228,0.15); }
select.text-input option { background:var(--surface); }

/* SCORE BAR */
.score-bar {
  display:flex; justify-content:space-between; align-items:center;
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:14px 20px; margin-bottom:20px;
}
.score-item { text-align:center; }
.score-label { font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; font-family:'Unbounded',sans-serif; }
.score-value { font-family:'Unbounded',sans-serif; font-size:20px; font-weight:700; color:var(--cyan); line-height:1.3; margin-top:2px; }
.score-divider { width:1px; height:36px; background:var(--border); }

/* NAV */
.nav-bar {
  display:flex; background:var(--surface);
  border:1px solid var(--border); border-radius:14px;
  padding:4px; margin-bottom:20px; gap:4px;
}
.nav-btn {
  flex:1; padding:10px 4px; border:none; background:transparent;
  color:var(--muted); font-family:'Manrope',sans-serif;
  font-size:11px; border-radius:10px; cursor:pointer;
  transition:all 0.2s; text-align:center; font-weight:600;
}
.nav-btn.active { background:var(--card); color:var(--cyan); border:1px solid var(--border); }

/* MODE TABS */
.mode-tabs {
  display:flex; background:var(--surface);
  border:1px solid var(--border); border-radius:12px;
  padding:4px; margin-bottom:20px; gap:4px;
}
.mode-tab {
  flex:1; padding:9px 4px; border:none; background:transparent;
  color:var(--muted); font-family:'Manrope',sans-serif;
  font-size:13px; border-radius:8px; cursor:pointer;
  transition:all 0.2s; text-align:center; font-weight:600;
}
.mode-tab.active { background:linear-gradient(135deg,var(--blue),var(--blue2)); color:#fff; }

/* GAME CARD */
.game-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:28px 24px; margin-bottom:16px;
  position:relative; overflow:hidden; animation:slideIn 0.3s ease;
}
.game-card::before {
  content:''; position:absolute; top:0;left:0;right:0; height:2px;
  background:linear-gradient(90deg, var(--blue), var(--cyan));
}
.question-label { font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:14px; font-family:'Unbounded',sans-serif; }
.question-word { font-family:'Unbounded',sans-serif; font-size:32px; font-weight:900; color:var(--white); margin-bottom:8px; line-height:1.2; }
.question-hint { font-size:13px; color:var(--muted); margin-bottom:4px; }
.category-badge {
  display:inline-block; background:rgba(45,107,228,0.15);
  border:1px solid rgba(45,107,228,0.3); color:var(--blue2);
  font-size:11px; letter-spacing:1px; padding:4px 12px;
  border-radius:20px; margin-top:8px; font-family:'Unbounded',sans-serif;
}
.speak-btn {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(0,198,255,0.1); border:1px solid rgba(0,198,255,0.25);
  color:var(--cyan); padding:7px 16px; border-radius:20px;
  font-size:13px; cursor:pointer; margin-top:12px;
  transition:all 0.2s; font-family:'Manrope',sans-serif; font-weight:600;
}
.speak-btn:hover { background:rgba(0,198,255,0.2); }

/* CHOICES */
.choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
.choice-btn {
  padding:14px 10px; background:var(--surface);
  border:1px solid var(--border); border-radius:12px;
  color:var(--white); font-family:'Manrope',sans-serif;
  font-size:14px; cursor:pointer; transition:all 0.2s;
  text-align:center; line-height:1.3; font-weight:500;
}
.choice-btn:hover:not(:disabled) { border-color:var(--blue); color:var(--blue2); background:rgba(45,107,228,0.08); }
.choice-btn.correct { background:rgba(46,204,113,0.15); border-color:var(--green); color:var(--green); }
.choice-btn.wrong { background:rgba(224,85,85,0.15); border-color:var(--red); color:var(--red); }

/* INPUT */
.translation-input {
  width:100%; background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:14px 16px; color:var(--white);
  font-family:'Manrope',sans-serif; font-size:17px; margin-top:16px;
  outline:none; transition:all 0.2s;
}
.translation-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(45,107,228,0.15); }
.translation-input.correct { border-color:var(--green); background:rgba(46,204,113,0.08); }
.translation-input.wrong { border-color:var(--red); background:rgba(224,85,85,0.08); }

/* SCRAMBLE */
.scramble-area { margin-top:16px; }
.answer-slots {
  display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
  margin-bottom:14px; min-height:50px;
  background:rgba(255,255,255,0.02); border:1px dashed var(--border);
  border-radius:12px; padding:10px; align-items:center;
}
.letter-slot {
  width:36px; height:36px; background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:#fff; border:none; border-radius:8px;
  font-family:'Unbounded',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.letter-pool { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
.letter-btn {
  width:36px; height:36px; background:var(--surface); color:var(--white);
  border:1px solid var(--border); border-radius:8px;
  font-family:'Unbounded',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.letter-btn:hover:not(:disabled) { border-color:var(--blue); color:var(--cyan); }
.letter-btn:disabled { opacity:0.2; cursor:default; }

/* FEEDBACK */
.feedback { text-align:center; padding:12px; border-radius:12px; font-size:15px; margin-bottom:16px; display:none; font-weight:600; }
.feedback.correct { background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.3); color:var(--green); display:block; }
.feedback.wrong { background:rgba(224,85,85,0.1); border:1px solid rgba(224,85,85,0.3); color:var(--red); display:block; }

/* BUTTONS */
.btn-primary {
  width:100%; padding:15px;
  background:linear-gradient(135deg, var(--blue), var(--blue2));
  color:#fff; border:none; border-radius:14px;
  font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700;
  letter-spacing:1px; cursor:pointer; transition:all 0.2s;
  text-transform:uppercase; margin-bottom:10px;
  box-shadow:0 4px 20px rgba(45,107,228,0.3);
}
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 28px rgba(45,107,228,0.4); }
.btn-secondary {
  width:100%; padding:13px; background:transparent; color:var(--muted);
  border:1px solid var(--border); border-radius:14px;
  font-family:'Manrope',sans-serif; font-size:14px;
  cursor:pointer; transition:all 0.2s; margin-bottom:10px; font-weight:600;
}
.btn-secondary:hover { border-color:var(--blue); color:var(--white); }

/* PROGRESS */
.progress-wrap { margin-bottom:20px; }
.progress-info { display:flex; justify-content:space-between; margin-bottom:6px; }
.progress-label { font-size:11px; color:var(--muted); font-family:'Unbounded',sans-serif; letter-spacing:1px; }
.progress-bar { height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--cyan)); border-radius:4px; transition:width 0.4s ease; }

/* LEADERBOARD */
.leaderboard-card { background:var(--card); border:1px solid var(--border); border-radius:20px; overflow:hidden; margin-bottom:16px; }
.lb-header {
  background:linear-gradient(135deg,rgba(45,107,228,0.2),rgba(0,198,255,0.1));
  padding:16px 20px; border-bottom:1px solid var(--border);
  font-family:'Unbounded',sans-serif; font-size:12px;
  letter-spacing:2px; color:var(--cyan); text-transform:uppercase;
}
.lb-row { display:flex; align-items:center; padding:13px 20px; border-bottom:1px solid rgba(30,47,74,0.5); gap:12px; }
.lb-row:last-child { border-bottom:none; }
.lb-rank { font-family:'Unbounded',sans-serif; font-size:14px; font-weight:700; color:var(--muted); width:28px; }
.lb-flag { font-size:22px; }
.lb-info { flex:1; }
.lb-name { font-size:15px; color:var(--white); font-weight:600; }
.lb-country { font-size:11px; color:var(--muted); margin-top:2px; }
.lb-score { font-family:'Unbounded',sans-serif; font-size:15px; color:var(--cyan); font-weight:700; }

/* RESULT */
.result-screen { text-align:center; padding:40px 24px; }
.result-emoji { font-size:64px; margin-bottom:16px; }
.result-title { font-family:'Unbounded',sans-serif; font-size:22px; color:var(--cyan); margin-bottom:8px; }
.result-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:24px 0; }
.result-stat { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; }
.result-stat-value { font-family:'Unbounded',sans-serif; font-size:26px; color:var(--cyan); }
.result-stat-label { font-size:11px; color:var(--muted); margin-top:4px; }

/* WORD OF DAY */
.wod-card {
  background:linear-gradient(135deg, rgba(45,107,228,0.2), rgba(0,198,255,0.1));
  border:1px solid rgba(0,198,255,0.25); border-radius:20px;
  padding:20px 24px; margin-bottom:20px; position:relative; overflow:hidden;
}
.wod-card::before {
  content:''; position:absolute; top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue),var(--cyan));
}
.wod-label { font-family:'Unbounded',sans-serif; font-size:9px; letter-spacing:3px; color:var(--cyan); text-transform:uppercase; margin-bottom:10px; }
.wod-word { font-family:'Unbounded',sans-serif; font-size:28px; font-weight:900; color:var(--white); }
.wod-translation { font-size:15px; color:var(--muted); margin-top:4px; }

/* ADMIN */
.admin-section { margin-bottom:24px; }
.admin-title { font-family:'Unbounded',sans-serif; font-size:11px; letter-spacing:2px; color:var(--cyan); margin-bottom:12px; text-transform:uppercase; }
.color-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.color-item { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
.color-item label { font-size:13px; color:var(--muted); flex:1; }
.color-item input[type=color] { width:36px; height:28px; border:none; border-radius:6px; cursor:pointer; background:none; }
.word-row { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; margin-bottom:8px; }
.word-row-text { flex:1; }
.word-row-ch { color:var(--cyan); font-weight:700; font-size:15px; }
.word-row-ru { color:var(--muted); font-size:12px; margin-top:2px; }
.delete-btn { background:rgba(224,85,85,0.15); border:1px solid rgba(224,85,85,0.3); color:var(--red); border-radius:8px; padding:5px 12px; font-size:12px; cursor:pointer; font-weight:600; }
.add-word-form { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:16px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.small-input { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--white); font-family:'Manrope',sans-serif; font-size:14px; outline:none; width:100%; }
.small-input:focus { border-color:var(--blue); }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; backdrop-filter:blur(4px); }
.modal { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px 24px; width:100%; max-width:340px; position:relative; overflow:hidden; }
.modal::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background:linear-gradient(90deg,var(--blue),var(--cyan)); }
.modal-title { font-family:'Unbounded',sans-serif; font-size:16px; color:var(--cyan); margin-bottom:16px; text-align:center; }

/* STREAK BADGE */
.streak-display { display:inline-flex; align-items:center; gap:6px; background:rgba(240,192,64,0.1); border:1px solid rgba(240,192,64,0.25); color:var(--gold); padding:6px 14px; border-radius:20px; font-size:13px; font-weight:700; margin-bottom:16px; }

/* CATEGORIES */
.category-tabs { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:16px; scrollbar-width:none; }
.category-tabs::-webkit-scrollbar { display:none; }
.cat-tab { flex-shrink:0; padding:6px 14px; background:var(--surface); border:1px solid var(--border); border-radius:20px; color:var(--muted); font-size:12px; cursor:pointer; transition:all 0.2s; font-weight:600; }
.cat-tab.active { background:rgba(45,107,228,0.2); border-color:var(--blue); color:var(--blue2); }

/* ORNAMENT */
.ornament-border {
  width:100%; height:20px; margin:12px 0;
  background-image: repeating-linear-gradient(90deg,
    transparent 0px, transparent 8px,
    rgba(0,198,255,0.3) 8px, rgba(0,198,255,0.3) 10px,
    transparent 10px, transparent 18px,
    rgba(45,107,228,0.4) 18px, rgba(45,107,228,0.4) 20px
  );
  position:relative;
}
.ornament-svg {
  width:100%; opacity:0.4; margin:8px 0;
}
.greeting-chechen {
  font-family:'Unbounded',sans-serif;
  font-size:18px; font-weight:900;
  color:var(--cyan); text-align:center;
  letter-spacing:3px; margin-bottom:4px;
  text-shadow:0 0 20px rgba(0,198,255,0.5);
  animation: glow 2s ease-in-out infinite;
}
.greeting-sub {
  font-size:12px; color:var(--muted);
  text-align:center; margin-bottom:16px;
}
.app-icon {
  width:80px; height:80px; margin:0 auto 12px;
  display:block;
}

/* ANIMATIONS */
@keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
@keyframes glow { 0%,100%{box-shadow:0 0 10px rgba(0,198,255,0.2);text-shadow:0 0 10px rgba(0,198,255,0.3)} 50%{box-shadow:0 0 20px rgba(0,198,255,0.4);text-shadow:0 0 20px rgba(0,198,255,0.7)} }
.score-value.pop { animation:pop 0.3s ease; }
</style>
</head>

async function loadWords() {
  try {
    const res = await fetch(`${FB_URL}/words.json`);
    const data = await res.json();
    if (data && Array.isArray(data) && data.length > 0) {
      words = data;
    } else {
      const saved = localStorage.getItem('chechenWords');
      if (saved) words = JSON.parse(saved);
    }
  } catch(e) {
    const saved = localStorage.getItem('chechenWords');
    if (saved) words = JSON.parse(saved);
  }
}

async function saveWords() {
  try {
    localStorage.setItem('chechenWords', JSON.stringify(words));
    await fetch(`${FB_URL}/words.json`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(words)
    });
  } catch(e) { localStorage.setItem('chechenWords', JSON.stringify(words)); }
}

let answered = false, adminUnlocked = false;
let selectedCategory = 'Все';

// ---- REGISTER ----
async function startGame() {
  const name = document.getElementById('regName').value.trim();
  const country = document.getElementById('regCountry').value;
  if (!name) { alert('Введи своё имя!'); return; }
  if (!country) { alert('Выбери страну!'); return; }
  playerName = name; playerCountry = country;
  document.getElementById('playerGreeting').textContent = `Привет, ${name}! 👋`;
  document.getElementById('registerScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');
  await loadWords();
  renderCategories();
  renderWordOfDay();
  loadNewWord();
}

// ---- WORD OF DAY ----
function renderWordOfDay() {
  const idx = new Date().getDate() % words.length;
  const w = words[idx];
  document.getElementById('wordOfDay').innerHTML = `
    <div class="wod-card">
      <div class="wod-label">⭐ Слово дня</div>
      <div class="wod-word">${w.chechen}</div>
      <div class="wod-translation">${w.russian} · ${w.category}</div>
      <button class="speak-btn" onclick="speak('${w.transcription}')">🔊 Слушать</button>
    </div>
  `;
}

// ---- CATEGORIES ----
function renderCategories() {
  const cats = ['Все', ...new Set(words.map(w => w.category))];
  document.getElementById('categoryTabs').innerHTML = cats.map(c => `
    <button class="cat-tab ${c===selectedCategory?'active':''}" onclick="selectCategory('${c}')">${c}</button>
  `).join('');
}

function selectCategory(cat) {
  selectedCategory = cat;
  renderCategories();
  usedWords = [];
  loadNewWord();
}

function getWordPool() {
  return selectedCategory === 'Все' ? words : words.filter(w => w.category === selectedCategory);
}

// ---- NAV ----
function showTab(tab) {
  ['game','leaderboard','words','admin'].forEach(t => {
    document.getElementById(t+'Tab').style.display = t===tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['game','leaderboard','words','admin'][i] === tab);
  });
  if (tab==='leaderboard') renderLeaderboard();
  if (tab==='admin') renderAdminWords();
  if (tab==='words') renderWordsList();
}

// ---- WORDS LIST ----
function renderWordsList() {
  const q = document.getElementById('wordSearch').value.toLowerCase();
  const filtered = words.filter(w =>
    w.chechen.toLowerCase().includes(q) || w.russian.toLowerCase().includes(q)
  );
  const grouped = {};
  filtered.forEach(w => { if (!grouped[w.category]) grouped[w.category]=[]; grouped[w.category].push(w); });
  document.getElementById('wordsListDisplay').innerHTML = Object.entries(grouped).map(([cat, ws]) => `
    <div style="margin-bottom:16px">
      <div style="font-family:'Unbounded',sans-serif;font-size:10px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;margin-bottom:8px">${cat}</div>
      ${ws.map(w => `
        <div class="word-row">
          <div class="word-row-text">
            <div class="word-row-ch">${w.chechen}</div>
            <div class="word-row-ru">${w.russian}</div>
          </div>
          <button class="speak-btn" style="margin-top:0;padding:5px 12px;font-size:12px" onclick="speak('${w.transcription}')">🔊</button>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ---- ADMIN ----
function showAdminLogin() {
  if (adminUnlocked) { showTab('admin'); return; }
  document.getElementById('adminModal').style.display = 'flex';
  setTimeout(() => document.getElementById('adminPassword').focus(), 100);
}
function checkAdmin() {
  if (document.getElementById('adminPassword').value === ADMIN_PASS) {
    adminUnlocked = true;
    document.getElementById('adminModal').style.display = 'none';
    document.getElementById('adminPassword').value = '';
    showTab('admin');
  } else { alert('Неверный пароль!'); document.getElementById('adminPassword').value = ''; }
}
function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }
function changeColor(v, val) { document.documentElement.style.setProperty(v, val); }
function addWord() {
  const ch = document.getElementById('newChechen').value.trim();
  const ru = document.getElementById('newRussian').value.trim();
  const tr = document.getElementById('newTranscription').value.trim();
  const cat = document.getElementById('newCategory').value.trim();
  if (!ch || !ru) { alert('Заполни хотя бы чеченское и русское!'); return; }
  words.push({chechen:ch,russian:ru,transcription:tr||ch,category:cat||'Другое'});
  saveWords();
  document.getElementById('newChechen').value='';
  document.getElementById('newRussian').value='';
  document.getElementById('newTranscription').value='';
  document.getElementById('newCategory').value='';
  renderAdminWords(); renderCategories();
}
function deleteWord(idx) {
  if (confirm('Удалить?')) { words.splice(idx,1); saveWords(); renderAdminWords(); renderCategories(); }
}
function renderAdminWords() {
  document.getElementById('wordCountAdmin').textContent = words.length;
  document.getElementById('wordList').innerHTML = words.map((w,i) => `
    <div class="word-row">
      <div class="word-row-text"><div class="word-row-ch">${w.chechen}</div><div class="word-row-ru">${w.russian} · ${w.category}</div></div>
      <button class="delete-btn" onclick="deleteWord(${i})">✕</button>
    </div>
  `).join('');
}

// ---- LEADERBOARD ----
async function renderLeaderboard() {
  document.getElementById('lbList').innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted)">Загрузка... ⏳</div>';
  await loadLeaderboard();
  const sorted = leaderboard.slice(0,10);
  document.getElementById('lbList').innerHTML = sorted.length===0
    ? '<div style="padding:24px;text-align:center;color:var(--muted)">Пока никого нет. Будь первым! 🏆</div>'
    : sorted.map((p,i)=>`
      <div class="lb-row">
        <div class="lb-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
        <div class="lb-flag">${p.country.split(' ')[0]}</div>
        <div class="lb-info"><div class="lb-name">${p.name}</div><div class="lb-country">${p.country}</div></div>
        <div class="lb-score">${p.score}</div>
      </div>
    `).join('');
}
async function saveToLeaderboard() {
  try {
    const entry = {name:playerName, country:playerCountry, score, date: Date.now()};
    await fetch(`${FB_URL}/leaderboard.json`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(entry)
    });
  } catch(e) { console.log('Save error:', e); }
}

// ---- SOUNDS ----
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playCorrect() {
  try {
    const ctx = getAudioCtx();
    // Two pleasant ascending notes like Duolingo
    [0, 0.15].forEach((delay, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(i === 0 ? 523 : 659, ctx.currentTime + delay); // C5 then E5
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.3);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.3);
    });
  } catch(e) {}
}

function playWrong() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(220, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function playStreak() {
  try {
    const ctx = getAudioCtx();
    // 3 ascending notes for streak
    [523, 659, 784].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
      gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + i * 0.12 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.25);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.25);
    });
  } catch(e) {}
}

// ---- SPEECH ----
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='ru-RU'; u.rate=0.8; u.pitch=1;
  window.speechSynthesis.speak(u);
}

// ---- GAME ----
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['translate','choice','scramble'][i]===mode));
  loadNewWord();
}

function loadNewWord() {
  answered=false;
  document.getElementById('feedback').className='feedback';
  document.getElementById('actionBtn').textContent='Проверить';
  document.getElementById('actionBtn').disabled=false;
  document.getElementById('actionBtn').onclick=handleAction;
  document.getElementById('gameArea').style.display='block';
  document.getElementById('resultArea').style.display='none';

  const pool = getWordPool().filter(w=>!usedWords.includes(w));
  if (pool.length===0) usedWords=[];
  const p2 = getWordPool().filter(w=>!usedWords.includes(w));
  if (p2.length===0) return;
  currentWord = p2[Math.floor(Math.random()*p2.length)];
  usedWords.push(currentWord);
  if (usedWords.length>5) usedWords.shift();

  const pct = Math.min((totalAnswered/20)*100,100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=totalAnswered+' / 20';
  renderCard();
}

function renderCard() {
  const card = document.getElementById('gameCard');
  const askChechen = Math.random()>0.4;

  if (currentMode==='translate') {
    card.innerHTML=`
      <div class="question-label">${askChechen?'Чеченское слово':'Русское слово'}</div>
      <div class="question-word">${askChechen?currentWord.chechen:currentWord.russian}</div>
      <div class="question-hint">${askChechen?'произносится: '+currentWord.transcription:'переведи на чеченский'}</div>
      <div class="category-badge">${currentWord.category}</div>
      <button class="speak-btn" onclick="speak('${currentWord.transcription}')">🔊 Слушать</button>
      <input type="text" class="translation-input" id="answerInput"
        placeholder="${askChechen?'Перевод на русский...':'Перевод на чеченский...'}"
        onkeydown="if(event.key==='Enter') handleAction()">
    `;
    card.dataset.askChechen=askChechen; card.dataset.mode='translate';
    document.getElementById('actionBtn').style.display='block';
    setTimeout(()=>document.getElementById('answerInput')?.focus(),100);

  } else if (currentMode==='choice') {
    const pool = getWordPool();
    const wrong = pool.filter(w=>w!==currentWord).sort(()=>Math.random()-0.5).slice(0,3);
    const all = [currentWord,...wrong].sort(()=>Math.random()-0.5);
    card.innerHTML=`
      <div class="question-label">${askChechen?'Переведи на русский':'Переведи на чеченский'}</div>
      <div class="question-word">${askChechen?currentWord.chechen:currentWord.russian}</div>
      ${askChechen?`<div class="question-hint">произносится: ${currentWord.transcription}</div>`:''}
      <div class="category-badge">${currentWord.category}</div>
      <button class="speak-btn" onclick="speak('${currentWord.transcription}')">🔊 Слушать</button>
      <div class="choices">
        ${all.map(w=>`<button class="choice-btn" onclick="checkChoice(this,'${w.chechen}')">${askChechen?w.russian:w.chechen}</button>`).join('')}
      </div>
    `;
    card.dataset.mode='choice';
    document.getElementById('actionBtn').style.display='none';

  } else {
    const letters = currentWord.russian.split('').sort(()=>Math.random()-0.5);
    scrambleSelected=[];
    card.innerHTML=`
      <div class="question-label">Составь слово по-русски</div>
      <div class="question-word">${currentWord.chechen}</div>
      <div class="question-hint">произносится: ${currentWord.transcription}</div>
      <div class="category-badge">${currentWord.category}</div>
      <button class="speak-btn" onclick="speak('${currentWord.transcription}')">🔊 Слушать</button>
      <div class="scramble-area">
        <div class="answer-slots" id="answerSlots"></div>
        <div class="letter-pool">
          ${letters.map((l,i)=>`<button class="letter-btn" id="lbtn${i}" onclick="addLetter('${l}',${i})">${l}</button>`).join('')}
        </div>
      </div>
    `;
    card.dataset.mode='scramble';
    document.getElementById('actionBtn').style.display='block';
  }
}

function addLetter(letter,idx) {
  scrambleSelected.push({letter,idx});
  document.getElementById(`lbtn${idx}`).disabled=true;
  const btn=document.createElement('button');
  btn.className='letter-slot'; btn.textContent=letter;
  btn.onclick=()=>{btn.remove();document.getElementById(`lbtn${idx}`).disabled=false;scrambleSelected=scrambleSelected.filter(s=>s.idx!==idx);};
  document.getElementById('answerSlots').appendChild(btn);
}

function checkChoice(btn,chechenKey) {
  if (answered) return; answered=true;
  const isCorrect=chechenKey===currentWord.chechen;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    const k=b.getAttribute('onclick').match(/'([^']+)'\)/)[1];
    if(k===currentWord.chechen) b.classList.add('correct');
    else if(b===btn&&!isCorrect) b.classList.add('wrong');
    b.disabled=true;
  });
  handleResult(isCorrect,currentWord.russian);
  document.getElementById('actionBtn').style.display='block';
  document.getElementById('actionBtn').textContent='Следующее →';
  document.getElementById('actionBtn').onclick=()=>{document.getElementById('actionBtn').onclick=handleAction;loadNewWord();};
}

function handleAction() {
  if (answered) {loadNewWord();return;}
  const card=document.getElementById('gameCard');
  if (card.dataset.mode==='translate') {
    const input=document.getElementById('answerInput');
    const ua=input.value.trim().toLowerCase();
    if (!ua) return;
    const ask=card.dataset.askChechen==='true';
    const correct=ask?currentWord.russian.toLowerCase():currentWord.chechen.toLowerCase();
    const ok=ua===correct;
    input.className='translation-input '+(ok?'correct':'wrong');
    handleResult(ok,ask?currentWord.russian:currentWord.chechen);
    answered=true;
    document.getElementById('actionBtn').textContent='Следующее →';
  } else if (card.dataset.mode==='scramble') {
    const ua=scrambleSelected.map(s=>s.letter).join('');
    const ok=ua.toLowerCase()===currentWord.russian.toLowerCase();
    handleResult(ok,currentWord.russian);
    answered=true;
    document.getElementById('actionBtn').textContent='Следующее →';
  }
}

function handleResult(ok,correctAnswer) {
  totalAnswered++;
  const fb=document.getElementById('feedback');
  if (ok) {
    correctAnswers++; streak++;
    if (streak>bestStreak) bestStreak=streak;
    score+=10+(streak>=3?streak*5:0);
    fb.className='feedback correct';
    if (streak >= 3) playStreak(); else playCorrect();
    fb.textContent=streak>=3?`🔥 Серия ${streak}! +${10+streak*5} очков`:'✓ Верно! +10 очков';
  } else {
    streak=0; fb.className='feedback wrong';
    fb.textContent=`✗ Правильно: ${correctAnswer}`;
    playWrong();
  }
  updateStats();
  if (totalAnswered>=20) setTimeout(showResults,1500);
}

function updateStats() {
  const el=document.getElementById('score');
  el.textContent=score; el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),300);
  document.getElementById('streak').textContent=streak>0?`${streak}🔥`:'0';
  document.getElementById('wordCount').textContent=totalAnswered;
}

function skipWord() {streak=0;updateStats();loadNewWord();}

function showResults() {
  saveToLeaderboard();
  document.getElementById('gameArea').style.display='none';
  document.getElementById('resultArea').style.display='block';
  const acc=Math.round((correctAnswers/totalAnswered)*100);
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalAccuracy').textContent=acc+'%';
  document.getElementById('finalCorrect').textContent=correctAnswers;
  document.getElementById('finalStreak').textContent=bestStreak;
  document.getElementById('resultEmoji').textContent=acc>=80?'🏆':acc>=50?'⭐':'📚';
  document.getElementById('resultTitle').textContent=acc>=80?'Отлично!':acc>=50?'Хороший результат!':'Учись дальше!';
  document.getElementById('resultMsg').textContent=acc>=80?'Ты хорошо знаешь чеченский язык!':acc>=50?'Продолжай практиковаться!':'Повторяй слова — и всё получится!';
}

function restartGame() {
  score=0;streak=0;bestStreak=0;totalAnswered=0;correctAnswers=0;usedWords=[];
  updateStats();
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressText').textContent='0 / 20';
  document.getElementById('gameArea').style.display='block';
  document.getElementById('resultArea').style.display='none';
  loadNewWord();
}
</script>
