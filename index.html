<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нохчийн мотт — Учи чеченский</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --card: #1a1a26;
  --border: #2a2a3e;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --red: #c0392b;
  --green: #27ae60;
  --text: #e8e0d0;
  --muted: #7a7a9a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(192,57,43,0.05) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}
.container {
  width:100%;
  max-width:420px;
  padding:0 16px 40px;
  position:relative;
  z-index:1;
}

/* SCREENS */
.screen { display:none; }
.screen.active { display:block; }

/* HEADER */
header {
  text-align:center;
  padding:32px 0 24px;
  border-bottom:1px solid var(--border);
  margin-bottom:24px;
}
.logo-text {
  font-family:'Cinzel',serif;
  font-size:11px;
  letter-spacing:4px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:8px;
}
h1 { font-family:'Cinzel',serif; font-size:26px; font-weight:900; color:var(--text); line-height:1.2; }
h1 span { color:var(--gold); }
.subtitle { font-size:14px; color:var(--muted); margin-top:6px; font-style:italic; }

/* REGISTER */
.register-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px 24px;
  margin-bottom:16px;
  position:relative;
}
.register-card::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.field-label {
  font-size:11px;
  letter-spacing:2px;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:8px;
  margin-top:16px;
}
.field-label:first-child { margin-top:0; }
.text-input {
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:13px 16px;
  color:var(--text);
  font-family:'Crimson Pro',serif;
  font-size:17px;
  outline:none;
  transition:border-color 0.2s;
}
.text-input:focus { border-color:var(--gold); }

select.text-input option { background:var(--surface); color:var(--text); }

/* SCORE BAR */
.score-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 20px;
  margin-bottom:20px;
}
.score-item { text-align:center; }
.score-label { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
.score-value { font-family:'Cinzel',serif; font-size:20px; font-weight:700; color:var(--gold); line-height:1.2; }
.score-divider { width:1px; height:36px; background:var(--border); }

/* MODE TABS */
.mode-tabs {
  display:flex;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:4px;
  margin-bottom:20px;
  gap:4px;
}
.mode-tab {
  flex:1;
  padding:8px 4px;
  border:none;
  background:transparent;
  color:var(--muted);
  font-family:'Crimson Pro',serif;
  font-size:13px;
  border-radius:7px;
  cursor:pointer;
  transition:all 0.2s;
  text-align:center;
}
.mode-tab.active { background:var(--gold); color:var(--bg); font-weight:600; }

/* GAME CARD */
.game-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px 24px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
  animation:slideIn 0.3s ease;
}
.game-card::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.question-label { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
.question-word { font-family:'Cinzel',serif; font-size:34px; font-weight:900; color:var(--text); margin-bottom:8px; line-height:1.1; }
.question-hint { font-size:13px; color:var(--muted); font-style:italic; margin-bottom:4px; }
.category-badge {
  display:inline-block;
  background:rgba(201,168,76,0.1);
  border:1px solid rgba(201,168,76,0.3);
  color:var(--gold);
  font-size:11px;
  letter-spacing:1px;
  padding:3px 10px;
  border-radius:20px;
  margin-top:8px;
}

/* SPEAK BUTTON */
.speak-btn {
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(201,168,76,0.1);
  border:1px solid rgba(201,168,76,0.3);
  color:var(--gold);
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  margin-top:10px;
  transition:all 0.2s;
  font-family:'Crimson Pro',serif;
}
.speak-btn:hover { background:rgba(201,168,76,0.2); }
.speak-btn.speaking { background:rgba(201,168,76,0.3); animation:pulse 1s infinite; }

/* CHOICES */
.choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
.choice-btn {
  padding:14px 10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:'Crimson Pro',serif;
  font-size:15px;
  cursor:pointer;
  transition:all 0.2s;
  text-align:center;
  line-height:1.3;
}
.choice-btn:hover:not(:disabled) { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,0.05); }
.choice-btn.correct { background:rgba(39,174,96,0.15); border-color:var(--green); color:var(--green); }
.choice-btn.wrong { background:rgba(192,57,43,0.15); border-color:var(--red); color:var(--red); }

/* INPUT */
.translation-input {
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  color:var(--text);
  font-family:'Crimson Pro',serif;
  font-size:18px;
  margin-top:16px;
  outline:none;
  transition:border-color 0.2s;
}
.translation-input:focus { border-color:var(--gold); }
.translation-input.correct { border-color:var(--green); background:rgba(39,174,96,0.08); }
.translation-input.wrong { border-color:var(--red); background:rgba(192,57,43,0.08); }

/* SCRAMBLE */
.answer-slots {
  display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
  margin-bottom:16px; min-height:52px;
  background:rgba(255,255,255,0.02);
  border:1px dashed var(--border);
  border-radius:10px; padding:10px; align-items:center;
}
.letter-slot {
  width:36px; height:36px;
  background:var(--gold); color:var(--bg);
  border:none; border-radius:8px;
  font-family:'Cinzel',serif; font-size:15px; font-weight:700;
  cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center;
}
.letter-pool { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
.letter-btn {
  width:36px; height:36px;
  background:var(--surface); color:var(--text);
  border:1px solid var(--border); border-radius:8px;
  font-family:'Cinzel',serif; font-size:15px; font-weight:700;
  cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center;
}
.letter-btn:hover:not(:disabled) { border-color:var(--gold); color:var(--gold); }
.letter-btn:disabled { opacity:0.2; cursor:default; }

/* FEEDBACK */
.feedback {
  text-align:center; padding:12px; border-radius:10px;
  font-size:15px; margin-bottom:16px; display:none;
}
.feedback.correct { background:rgba(39,174,96,0.1); border:1px solid rgba(39,174,96,0.3); color:var(--green); display:block; }
.feedback.wrong { background:rgba(192,57,43,0.1); border:1px solid rgba(192,57,43,0.3); color:#e74c3c; display:block; }

/* BUTTONS */
.btn-primary {
  width:100%; padding:15px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--bg); border:none; border-radius:12px;
  font-family:'Cinzel',serif; font-size:14px; font-weight:700;
  letter-spacing:2px; cursor:pointer; transition:all 0.2s;
  text-transform:uppercase; margin-bottom:10px;
}
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(201,168,76,0.3); }
.btn-secondary {
  width:100%; padding:12px;
  background:transparent; color:var(--muted);
  border:1px solid var(--border); border-radius:12px;
  font-family:'Crimson Pro',serif; font-size:14px;
  cursor:pointer; transition:all 0.2s; margin-bottom:10px;
}
.btn-secondary:hover { border-color:var(--muted); color:var(--text); }

/* PROGRESS */
.progress-bar { height:3px; background:var(--border); border-radius:2px; margin-bottom:20px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:2px; transition:width 0.4s ease; }

/* LEADERBOARD */
.leaderboard-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  margin-bottom:16px;
}
.lb-header {
  background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  font-family:'Cinzel',serif;
  font-size:14px;
  letter-spacing:2px;
  color:var(--gold);
}
.lb-row {
  display:flex;
  align-items:center;
  padding:12px 20px;
  border-bottom:1px solid rgba(42,42,62,0.5);
  gap:12px;
}
.lb-row:last-child { border-bottom:none; }
.lb-rank { font-family:'Cinzel',serif; font-size:16px; font-weight:700; color:var(--muted); width:24px; }
.lb-rank.gold { color:#FFD700; }
.lb-rank.silver { color:#C0C0C0; }
.lb-rank.bronze { color:#CD7F32; }
.lb-flag { font-size:20px; }
.lb-info { flex:1; }
.lb-name { font-size:15px; color:var(--text); }
.lb-country { font-size:12px; color:var(--muted); }
.lb-score { font-family:'Cinzel',serif; font-size:16px; color:var(--gold); font-weight:700; }

/* RESULT */
.result-screen { text-align:center; padding:40px 24px; }
.result-emoji { font-size:60px; margin-bottom:16px; }
.result-title { font-family:'Cinzel',serif; font-size:24px; color:var(--gold); margin-bottom:8px; }
.result-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:24px 0; }
.result-stat { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
.result-stat-value { font-family:'Cinzel',serif; font-size:28px; color:var(--gold); }
.result-stat-label { font-size:12px; color:var(--muted); margin-top:4px; }

/* NAV */
.nav-bar {
  display:flex;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:4px;
  margin-bottom:20px;
  gap:4px;
}
.nav-btn {
  flex:1; padding:10px 4px;
  border:none; background:transparent;
  color:var(--muted); font-family:'Crimson Pro',serif;
  font-size:12px; border-radius:8px;
  cursor:pointer; transition:all 0.2s; text-align:center;
}
.nav-btn.active { background:var(--card); color:var(--gold); border:1px solid var(--border); }

/* ADMIN */
.admin-section { margin-bottom:24px; }
.admin-title {
  font-family:'Cinzel',serif; font-size:13px;
  letter-spacing:2px; color:var(--gold);
  margin-bottom:12px; text-transform:uppercase;
}
.word-row {
  display:flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:10px 14px; margin-bottom:8px;
}
.word-row-text { flex:1; font-size:14px; }
.word-row-ch { color:var(--gold); font-weight:600; }
.word-row-ru { color:var(--muted); font-size:12px; }
.delete-btn {
  background:rgba(192,57,43,0.2); border:1px solid rgba(192,57,43,0.3);
  color:#e74c3c; border-radius:6px; padding:4px 10px;
  font-size:12px; cursor:pointer;
}
.add-word-form {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:16px; margin-bottom:16px;
}
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.small-input {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; color:var(--text);
  font-family:'Crimson Pro',serif; font-size:15px; outline:none; width:100%;
}
.small-input:focus { border-color:var(--gold); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.8);
  display:flex; align-items:center; justify-content:center;
  z-index:100; padding:20px;
}
.modal { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px 24px; width:100%; max-width:340px; }
.modal-title { font-family:'Cinzel',serif; font-size:18px; color:var(--gold); margin-bottom:16px; text-align:center; }

/* COLOR PICKERS */
.color-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.color-item { display:flex; align-items:center; gap:8px; }
.color-item label { font-size:13px; color:var(--muted); flex:1; }
.color-item input[type=color] { width:40px; height:32px; border:none; border-radius:6px; cursor:pointer; background:none; }

/* ANIMATIONS */
@keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.score-value.pop { animation:pop 0.3s ease; }
</style>
</head>
<body>

<!-- REGISTER SCREEN -->
<div class="container screen active" id="registerScreen">
  <header>
    <div class="logo-text">Нохчийн мотт</div>
    <h1>Учи <span>Чеченский</span></h1>
    <div class="subtitle">Слова горного народа</div>
  </header>
  <div class="register-card">
    <div class="field-label">Твоё имя</div>
    <input type="text" class="text-input" id="regName" placeholder="Введи имя...">
    <div class="field-label">Страна</div>
    <select class="text-input" id="regCountry">
      <option value="">Выбери страну</option>
      <option value="🇷🇺 Россия">🇷🇺 Россия</option>
      <option value="🇩🇪 Германия">🇩🇪 Германия</option>
      <option value="🇦🇹 Австрия">🇦🇹 Австрия</option>
      <option value="🇨🇭 Швейцария">🇨🇭 Швейцария</option>
      <option value="🇫🇷 Франция">🇫🇷 Франция</option>
      <option value="🇹🇷 Турция">🇹🇷 Турция</option>
      <option value="🇦🇿 Азербайджан">🇦🇿 Азербайджан</option>
      <option value="🇬🇪 Грузия">🇬🇪 Грузия</option>
      <option value="🇺🇦 Украина">🇺🇦 Украина</option>
      <option value="🇰🇿 Казахстан">🇰🇿 Казахстан</option>
      <option value="🇺🇸 США">🇺🇸 США</option>
      <option value="🇬🇧 Великобритания">🇬🇧 Великобритания</option>
      <option value="🌍 Другая">🌍 Другая</option>
    </select>
  </div>
  <button class="btn-primary" onclick="startGame()">Начать игру →</button>
</div>

<!-- MAIN GAME SCREEN -->
<div class="container screen" id="gameScreen">
  <header>
    <div class="logo-text">Нохчийн мотт</div>
    <h1>Учи <span>Чеченский</span></h1>
    <div class="subtitle" id="playerGreeting">Привет!</div>
  </header>

  <div class="nav-bar">
    <button class="nav-btn active" onclick="showTab('game')">🎮 Игра</button>
    <button class="nav-btn" onclick="showTab('leaderboard')">🏆 Лидеры</button>
    <button class="nav-btn" onclick="showAdminLogin()">⚙️ Админ</button>
  </div>

  <!-- GAME TAB -->
  <div id="gameTab">
    <div class="score-bar">
      <div class="score-item">
        <div class="score-label">Очки</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <div class="score-label">Серия</div>
        <div class="score-value" id="streak">0🔥</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <div class="score-label">Слов</div>
        <div class="score-value" id="wordCount">0</div>
      </div>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('translate')">Перевод</button>
      <button class="mode-tab" onclick="setMode('choice')">Выбор</button>
      <button class="mode-tab" onclick="setMode('scramble')">Буквы</button>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div id="gameArea">
      <div class="game-card" id="gameCard"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-primary" id="actionBtn" onclick="handleAction()">Проверить</button>
      <button class="btn-secondary" onclick="skipWord()">Пропустить →</button>
    </div>

    <div id="resultArea" style="display:none">
      <div class="result-screen">
        <div class="result-emoji" id="resultEmoji">🏆</div>
        <div class="result-title" id="resultTitle">Молодец!</div>
        <p style="color:var(--muted);font-size:15px" id="resultMsg"></p>
        <div class="result-stats">
          <div class="result-stat"><div class="result-stat-value" id="finalScore">0</div><div class="result-stat-label">Очков</div></div>
          <div class="result-stat"><div class="result-stat-value" id="finalAccuracy">0%</div><div class="result-stat-label">Точность</div></div>
          <div class="result-stat"><div class="result-stat-value" id="finalCorrect">0</div><div class="result-stat-label">Правильно</div></div>
          <div class="result-stat"><div class="result-stat-value" id="finalStreak">0</div><div class="result-stat-label">Лучшая серия</div></div>
        </div>
        <button class="btn-primary" onclick="restartGame()">Играть снова</button>
        <button class="btn-secondary" onclick="showTab('leaderboard')">Таблица лидеров 🏆</button>
      </div>
    </div>
  </div>

  <!-- LEADERBOARD TAB -->
  <div id="leaderboardTab" style="display:none">
    <div class="leaderboard-card">
      <div class="lb-header">🏆 ТАБЛИЦА ЛИДЕРОВ</div>
      <div id="lbList"></div>
    </div>
    <button class="btn-secondary" onclick="showTab('game')">← Назад к игре</button>
  </div>

  <!-- ADMIN TAB -->
  <div id="adminTab" style="display:none">
    <div class="admin-section">
      <div class="admin-title">🎨 Цвета приложения</div>
      <div class="color-grid">
        <div class="color-item"><label>Фон</label><input type="color" value="#0a0a0f" onchange="changeColor('--bg',this.value)"></div>
        <div class="color-item"><label>Акцент</label><input type="color" value="#c9a84c" onchange="changeColor('--gold',this.value)"></div>
        <div class="color-item"><label>Карточки</label><input type="color" value="#1a1a26" onchange="changeColor('--card',this.value)"></div>
        <div class="color-item"><label>Текст</label><input type="color" value="#e8e0d0" onchange="changeColor('--text',this.value)"></div>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-title">📝 Добавить слово</div>
      <div class="add-word-form">
        <div class="form-row">
          <input class="small-input" id="newChechen" placeholder="Чеченское">
          <input class="small-input" id="newRussian" placeholder="Русское">
        </div>
        <div class="form-row">
          <input class="small-input" id="newTranscription" placeholder="Произношение">
          <input class="small-input" id="newCategory" placeholder="Категория">
        </div>
        <button class="btn-primary" onclick="addWord()" style="margin-bottom:0">Добавить слово</button>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-title">📚 Все слова (<span id="wordCountAdmin">0</span>)</div>
      <div id="wordList"></div>
    </div>

    <button class="btn-secondary" onclick="showTab('game')">← Назад к игре</button>
  </div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div class="modal-overlay" id="adminModal" style="display:none">
  <div class="modal">
    <div class="modal-title">🔐 Вход для админа</div>
    <input type="password" class="text-input" id="adminPassword" placeholder="Введи пароль..." onkeydown="if(event.key==='Enter') checkAdmin()">
    <br><br>
    <button class="btn-primary" onclick="checkAdmin()">Войти</button>
    <button class="btn-secondary" onclick="closeAdminModal()">Отмена</button>
  </div>
</div>

<script>
// =================== DATA ===================
let words = [
  { chechen:"Iа", russian:"Ты", transcription:"Иа", category:"Местоимения" },
  { chechen:"Со", russian:"Я", transcription:"Со", category:"Местоимения" },
  { chechen:"Оха", russian:"Мы", transcription:"Оха", category:"Местоимения" },
  { chechen:"Сан", russian:"Мой", transcription:"Сан", category:"Местоимения" },
  { chechen:"Хаза", russian:"Красивый", transcription:"Хаза", category:"Прилагательные" },
  { chechen:"Доккха", russian:"Большой", transcription:"Доккха", category:"Прилагательные" },
  { chechen:"КIеза", russian:"Маленький", transcription:"КIеза", category:"Прилагательные" },
  { chechen:"Дика", russian:"Хороший", transcription:"Дика", category:"Прилагательные" },
  { chechen:"Во", russian:"Плохой", transcription:"Во", category:"Прилагательные" },
  { chechen:"Сийлахь", russian:"Уважаемый", transcription:"Сийлахь", category:"Прилагательные" },
  { chechen:"Буьйса", russian:"Ночь", transcription:"Буьйса", category:"Время" },
  { chechen:"Де", russian:"День", transcription:"Де", category:"Время" },
  { chechen:"Шо", russian:"Год", transcription:"Шо", category:"Время" },
  { chechen:"Бутт", russian:"Месяц", transcription:"Бутт", category:"Время" },
  { chechen:"Хи", russian:"Вода", transcription:"Хи", category:"Природа" },
  { chechen:"Сирла", russian:"Свет", transcription:"Сирла", category:"Природа" },
  { chechen:"Лам", russian:"Гора", transcription:"Лам", category:"Природа" },
  { chechen:"Хьун", russian:"Лес", transcription:"Хьун", category:"Природа" },
  { chechen:"Зуда", russian:"Женщина", transcription:"Зуда", category:"Люди" },
  { chechen:"КIант", russian:"Парень", transcription:"КIант", category:"Люди" },
  { chechen:"ЙоI", russian:"Девушка", transcription:"ЙоI", category:"Люди" },
  { chechen:"Да", russian:"Отец", transcription:"Да", category:"Семья" },
  { chechen:"Нана", russian:"Мать", transcription:"Нана", category:"Семья" },
  { chechen:"Ваша", russian:"Брат", transcription:"Ваша", category:"Семья" },
  { chechen:"Йиша", russian:"Сестра", transcription:"Йиша", category:"Семья" },
  { chechen:"Дош", russian:"Слово", transcription:"Дош", category:"Речь" },
  { chechen:"Маршалла", russian:"Свобода", transcription:"Маршалла", category:"Ценности" },
  { chechen:"Ловзар", russian:"Игра", transcription:"Ловзар", category:"Жизнь" },
  { chechen:"Хlинца", russian:"Сейчас", transcription:"Хlинца", category:"Наречия" },
  { chechen:"ДIа", russian:"Туда", transcription:"ДIа", category:"Наречия" },
];

// Load saved words
const savedWords = localStorage.getItem('chechenWords');
if (savedWords) words = JSON.parse(savedWords);

// Leaderboard
let leaderboard = JSON.parse(localStorage.getItem('leaderboard') || '[]');

// Player
let playerName = '', playerCountry = '';
let currentMode = 'translate';
let currentWord = null;
let score = 0, streak = 0, bestStreak = 0;
let totalAnswered = 0, correctAnswers = 0;
let usedWords = [];
let scrambleSelected = [];
let answered = false;
let adminUnlocked = false;

const ADMIN_PASS = 'Larbar/biycar/1ambar54';

// =================== REGISTER ===================
function startGame() {
  const name = document.getElementById('regName').value.trim();
  const country = document.getElementById('regCountry').value;
  if (!name) { alert('Введи своё имя!'); return; }
  if (!country) { alert('Выбери страну!'); return; }
  playerName = name;
  playerCountry = country;
  document.getElementById('playerGreeting').textContent = `Привет, ${name}! 👋`;
  document.getElementById('registerScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');
  loadNewWord();
}

// =================== NAVIGATION ===================
function showTab(tab) {
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['game','leaderboard','admin'][i] === tab);
  });
  document.getElementById('gameTab').style.display = tab==='game' ? 'block' : 'none';
  document.getElementById('leaderboardTab').style.display = tab==='leaderboard' ? 'block' : 'none';
  document.getElementById('adminTab').style.display = tab==='admin' ? 'block' : 'none';
  if (tab === 'leaderboard') renderLeaderboard();
  if (tab === 'admin') renderAdminWords();
}

// =================== ADMIN ===================
function showAdminLogin() {
  if (adminUnlocked) { showTab('admin'); return; }
  document.getElementById('adminModal').style.display = 'flex';
  setTimeout(() => document.getElementById('adminPassword').focus(), 100);
}

function checkAdmin() {
  const pass = document.getElementById('adminPassword').value;
  if (pass === ADMIN_PASS) {
    adminUnlocked = true;
    document.getElementById('adminModal').style.display = 'none';
    document.getElementById('adminPassword').value = '';
    showTab('admin');
  } else {
    alert('Неверный пароль!');
    document.getElementById('adminPassword').value = '';
  }
}

function closeAdminModal() {
  document.getElementById('adminModal').style.display = 'none';
  document.getElementById('adminPassword').value = '';
}

function changeColor(variable, value) {
  document.documentElement.style.setProperty(variable, value);
}

function addWord() {
  const ch = document.getElementById('newChechen').value.trim();
  const ru = document.getElementById('newRussian').value.trim();
  const tr = document.getElementById('newTranscription').value.trim();
  const cat = document.getElementById('newCategory').value.trim();
  if (!ch || !ru) { alert('Заполни хотя бы чеченское и русское слово!'); return; }
  words.push({ chechen:ch, russian:ru, transcription:tr||ch, category:cat||'Другое' });
  localStorage.setItem('chechenWords', JSON.stringify(words));
  document.getElementById('newChechen').value = '';
  document.getElementById('newRussian').value = '';
  document.getElementById('newTranscription').value = '';
  document.getElementById('newCategory').value = '';
  renderAdminWords();
}

function deleteWord(idx) {
  if (confirm('Удалить слово?')) {
    words.splice(idx, 1);
    localStorage.setItem('chechenWords', JSON.stringify(words));
    renderAdminWords();
  }
}

function renderAdminWords() {
  document.getElementById('wordCountAdmin').textContent = words.length;
  document.getElementById('wordList').innerHTML = words.map((w,i) => `
    <div class="word-row">
      <div class="word-row-text">
        <div class="word-row-ch">${w.chechen}</div>
        <div class="word-row-ru">${w.russian} · ${w.category}</div>
      </div>
      <button class="delete-btn" onclick="deleteWord(${i})">✕</button>
    </div>
  `).join('');
}

// =================== LEADERBOARD ===================
function renderLeaderboard() {
  const sorted = [...leaderboard].sort((a,b) => b.score - a.score).slice(0, 10);
  const medals = ['gold','silver','bronze'];
  document.getElementById('lbList').innerHTML = sorted.length === 0
    ? '<div style="padding:20px;text-align:center;color:var(--muted)">Пока никого нет. Будь первым! 🏆</div>'
    : sorted.map((p,i) => `
      <div class="lb-row">
        <div class="lb-rank ${medals[i]||''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
        <div class="lb-flag">${p.country.split(' ')[0]}</div>
        <div class="lb-info">
          <div class="lb-name">${p.name}</div>
          <div class="lb-country">${p.country}</div>
        </div>
        <div class="lb-score">${p.score}</div>
      </div>
    `).join('');
}

function saveToLeaderboard() {
  leaderboard.push({ name:playerName, country:playerCountry, score });
  leaderboard.sort((a,b) => b.score - a.score);
  if (leaderboard.length > 50) leaderboard = leaderboard.slice(0, 50);
  localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
}

// =================== SPEECH ===================
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ru-RU';
  utt.rate = 0.8;
  utt.pitch = 1;
  window.speechSynthesis.speak(utt);
}

// =================== GAME ===================
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', ['translate','choice','scramble'][i] === mode);
  });
  loadNewWord();
}

function getWrongChoices(correct) {
  return words.filter(w => w !== correct).sort(() => Math.random() - 0.5).slice(0, 3);
}

function loadNewWord() {
  answered = false;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('actionBtn').textContent = 'Проверить';
  document.getElementById('actionBtn').disabled = false;
  document.getElementById('actionBtn').onclick = handleAction;
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('resultArea').style.display = 'none';

  const available = words.filter(w => !usedWords.includes(w));
  if (available.length === 0) usedWords = [];
  const pool = words.filter(w => !usedWords.includes(w));
  currentWord = pool[Math.floor(Math.random() * pool.length)];
  usedWords.push(currentWord);
  if (usedWords.length > 5) usedWords.shift();

  document.getElementById('progressFill').style.width = Math.min((totalAnswered/20)*100,100)+'%';
  renderCard();
}

function renderCard() {
  const card = document.getElementById('gameCard');
  const askChechen = Math.random() > 0.4;

  if (currentMode === 'translate') {
    const question = askChechen ? currentWord.chechen : currentWord.russian;
    card.innerHTML = `
      <div class="question-label">${askChechen ? 'Чеченское слово' : 'Русское слово'}</div>
      <div class="question-word">${question}</div>
      <div class="question-hint">${askChechen ? 'произносится: '+currentWord.transcription : 'переведи на чеченский'}</div>
      <div class="category-badge">${currentWord.category}</div>
      <button class="speak-btn" onclick="speak('${currentWord.transcription}')">🔊 Слушать</button>
      <input type="text" class="translation-input" id="answerInput"
        placeholder="${askChechen ? 'Перевод на русский...' : 'Перевод на чеченский...'}"
        onkeydown="if(event.key==='Enter') handleAction()">
    `;
    card.dataset.askChechen = askChechen;
    card.dataset.mode = 'translate';
    document.getElementById('actionBtn').style.display = 'block';
    setTimeout(() => document.getElementById('answerInput')?.focus(), 100);

  } else if (currentMode === 'choice') {
    const wrong = getWrongChoices(currentWord);
    const all = [currentWord, ...wrong].sort(() => Math.random() - 0.5);
    card.innerHTML = `
      <div class="question-label">${askChechen ? 'Переведи на русский' : 'Переведи на чеченский'}</div>
      <div class="question-word">${askChechen ? currentWord.chechen : currentWord.russian}</div>
      ${askChechen ? `<div class="question-hint">произносится: ${currentWord.transcription}</div>` : ''}
      <div class="category-badge">${currentWord.category}</div>
      <button class="speak-btn" onclick="speak('${currentWord.transcription}')">🔊 Слушать</button>
      <div class="choices">
        ${all.map(w => `<button class="choice-btn" onclick="checkChoice(this,'${w.chechen}')">${askChechen ? w.russian : w.chechen}</button>`).join('')}
      </div>
    `;
    card.dataset.mode = 'choice';
    document.getElementById('actionBtn').style.display = 'none';

  } else {
    const letters = currentWord.russian.split('').sort(() => Math.random() - 0.5);
    scrambleSelected = [];
    card.innerHTML = `
      <div class="question-label">Составь слово по-русски</div>
      <div class="question-word">${currentWord.chechen}</div>
      <div class="question-hint">произносится: ${currentWord.transcription}</div>
      <div class="category-badge">${currentWord.category}</div>
      <button class="speak-btn" onclick="speak('${currentWord.transcription}')">🔊 Слушать</button>
      <div class="scramble-area">
        <div class="answer-slots" id="answerSlots"></div>
        <div class="letter-pool">
          ${letters.map((l,i) => `<button class="letter-btn" id="lbtn${i}" onclick="addLetter('${l}',${i})">${l}</button>`).join('')}
        </div>
      </div>
    `;
    card.dataset.mode = 'scramble';
    document.getElementById('actionBtn').style.display = 'block';
  }
}

function addLetter(letter, idx) {
  scrambleSelected.push({letter,idx});
  document.getElementById(`lbtn${idx}`).disabled = true;
  const btn = document.createElement('button');
  btn.className = 'letter-slot';
  btn.textContent = letter;
  btn.onclick = () => {
    btn.remove();
    document.getElementById(`lbtn${idx}`).disabled = false;
    scrambleSelected = scrambleSelected.filter(s => s.idx !== idx);
  };
  document.getElementById('answerSlots').appendChild(btn);
}

function checkChoice(btn, chechenKey) {
  if (answered) return;
  answered = true;
  const isCorrect = chechenKey === currentWord.chechen;
  document.querySelectorAll('.choice-btn').forEach(b => {
    const k = b.getAttribute('onclick').match(/'([^']+)'\)/)[1];
    if (k === currentWord.chechen) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
    b.disabled = true;
  });
  handleResult(isCorrect, currentWord.russian);
  document.getElementById('actionBtn').style.display = 'block';
  document.getElementById('actionBtn').textContent = 'Следующее →';
  document.getElementById('actionBtn').onclick = () => { document.getElementById('actionBtn').onclick = handleAction; loadNewWord(); };
}

function handleAction() {
  if (answered) { loadNewWord(); return; }
  const card = document.getElementById('gameCard');
  if (card.dataset.mode === 'translate') {
    const input = document.getElementById('answerInput');
    const userAnswer = input.value.trim().toLowerCase();
    if (!userAnswer) return;
    const askChechen = card.dataset.askChechen === 'true';
    const correct = askChechen ? currentWord.russian.toLowerCase() : currentWord.chechen.toLowerCase();
    const isCorrect = userAnswer === correct;
    input.className = 'translation-input '+(isCorrect?'correct':'wrong');
    handleResult(isCorrect, askChechen ? currentWord.russian : currentWord.chechen);
    answered = true;
    document.getElementById('actionBtn').textContent = 'Следующее →';
  } else if (card.dataset.mode === 'scramble') {
    const userAnswer = scrambleSelected.map(s=>s.letter).join('');
    const isCorrect = userAnswer.toLowerCase() === currentWord.russian.toLowerCase();
    handleResult(isCorrect, currentWord.russian);
    answered = true;
    document.getElementById('actionBtn').textContent = 'Следующее →';
  }
}

function handleResult(isCorrect, correctAnswer) {
  totalAnswered++;
  const feedback = document.getElementById('feedback');
  if (isCorrect) {
    correctAnswers++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    score += 10 + (streak >= 3 ? streak*5 : 0);
    feedback.className = 'feedback correct';
    feedback.textContent = streak >= 3 ? `🔥 Серия ${streak}! +${10+streak*5} очков` : '✓ Верно! +10 очков';
  } else {
    streak = 0;
    feedback.className = 'feedback wrong';
    feedback.textContent = `✗ Правильно: ${correctAnswer}`;
  }
  updateStats();
  if (totalAnswered >= 20) setTimeout(showResults, 1500);
}

function updateStats() {
  const el = document.getElementById('score');
  el.textContent = score;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 300);
  document.getElementById('streak').textContent = streak > 0 ? `${streak}🔥` : '0';
  document.getElementById('wordCount').textContent = totalAnswered;
}

function skipWord() { streak = 0; updateStats(); loadNewWord(); }

function showResults() {
  saveToLeaderboard();
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('resultArea').style.display = 'block';
  const acc = Math.round((correctAnswers/totalAnswered)*100);
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalAccuracy').textContent = acc+'%';
  document.getElementById('finalCorrect').textContent = correctAnswers;
  document.getElementById('finalStreak').textContent = bestStreak;
  document.getElementById('resultEmoji').textContent = acc>=80?'🏆':acc>=50?'⭐':'📚';
  document.getElementById('resultTitle').textContent = acc>=80?'Отлично!':acc>=50?'Хороший результат!':'Учись дальше!';
  document.getElementById('resultMsg').textContent = acc>=80?'Ты хорошо знаешь чеченский язык!':acc>=50?'Продолжай практиковаться!':'Повторяй слова — и всё получится!';
}

function restartGame() {
  score=0;streak=0;bestStreak=0;totalAnswered=0;correctAnswers=0;usedWords=[];
  updateStats();
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('gameArea').style.display='block';
  document.getElementById('resultArea').style.display='none';
  loadNewWord();
}
</script>
</body>
</html>
